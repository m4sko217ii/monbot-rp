<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Paiement réussi — Los Santos RP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root { --red:#e8212a; --gold:#f5c518; --green:#00e676; --dark:#0a0a0f; --card:#12121a; --border:#1e1e2e; --text:#e0e0f0; --muted:#6b6b8a; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--dark); color:var(--text); font-family:'Rajdhani',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 60% 40% at 50% 50%, rgba(0,230,118,0.1) 0%, transparent 70%); pointer-events:none; }
  .box { background:var(--card); border:1px solid rgba(0,230,118,0.3); border-radius:8px; padding:60px 48px; text-align:center; max-width:480px; position:relative; overflow:hidden; }
  .box::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--green); }
  .icon { font-size:64px; margin-bottom:24px; animation:pop .5s cubic-bezier(.17,.67,.48,1.5); }
  @keyframes pop { from { transform:scale(0); opacity:0; } to { transform:scale(1); opacity:1; } }
  h1 { font-family:'Bebas Neue',sans-serif; font-size:40px; letter-spacing:3px; color:var(--green); margin-bottom:12px; }
  p { font-size:16px; color:var(--muted); line-height:1.6; margin-bottom:32px; }
  .info { background:rgba(0,230,118,0.06); border:1px solid rgba(0,230,118,0.2); border-radius:4px; padding:16px; margin-bottom:28px; font-size:14px; color:var(--text); }
  a { display:inline-block; padding:14px 32px; background:var(--green); border-radius:4px; color:#000; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; text-decoration:none; transition:opacity .2s; }
  a:hover { opacity:.85; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">✅</div>
  <h1>Paiement réussi !</h1>
  <p>Ton abonnement au Bot GTA RP Los Santos est maintenant actif. Tu peux utiliser toutes les commandes sur le serveur Discord.</p>
  <div class="info">💡 Ton accès est actif immédiatement.<br>Utilise <strong>/compte</strong> sur Discord pour vérifier.</div>
  <a href="/">← Retour au site</a>
</div>
<script>
  // Capturer le paiement automatiquement
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if (token) {
    fetch('/api/capture-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orderId: token })
    });
  }
</script>
</body>
</html>
