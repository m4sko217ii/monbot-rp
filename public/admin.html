<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Astra RP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root { --red:#e8212a; --gold:#f5c518; --green:#00e676; --dark:#0a0a0f; --card:#12121a; --border:#1e1e2e; --text:#e0e0f0; --muted:#6b6b8a; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--dark);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 30% at 50% 0%,rgba(232,33,42,0.12) 0%,transparent 70%);}

  #loginScreen{position:fixed;inset:0;background:var(--dark);z-index:100;display:flex;align-items:center;justify-content:center;}
  .login-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:48px;text-align:center;width:360px;position:relative;overflow:hidden;}
  .login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);}
  .login-box h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;margin-bottom:8px;}
  .login-box p{font-size:13px;color:var(--muted);margin-bottom:28px;}
  .login-box input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;outline:none;margin-bottom:16px;transition:border-color .2s;}
  .login-box input:focus{border-color:var(--red);}
  .login-btn{width:100%;padding:14px;background:var(--red);border:none;border-radius:4px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;transition:background .2s;}
  .login-btn:hover{background:#c91920;}

  #dashboard{display:none;position:relative;z-index:1;}
  nav{display:flex;align-items:center;justify-content:space-between;padding:20px 40px;border-bottom:1px solid var(--border);}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--red);}
  .logo span{color:var(--gold);}
  .nav-right{display:flex;gap:16px;align-items:center;}
  .refresh-btn{padding:8px 18px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;}
  .refresh-btn:hover{border-color:var(--red);color:var(--text);}

  .page{padding:40px;}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:40px;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:24px;position:relative;overflow:hidden;transition:transform .2s;}
  .stat-card:hover{transform:translateY(-2px);}
  .stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
  .stat-card.red::after{background:var(--red);}
  .stat-card.gold::after{background:var(--gold);}
  .stat-card.green::after{background:var(--green);}
  .stat-card.blue::after{background:#1e90ff;}
  .stat-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .stat-value{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:2px;line-height:1;}
  .stat-card.red .stat-value{color:var(--red);}
  .stat-card.gold .stat-value{color:var(--gold);}
  .stat-card.green .stat-value{color:var(--green);}
  .stat-card.blue .stat-value{color:#1e90ff;}

  .add-section{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:28px;margin-bottom:32px;}
  .add-section h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:20px;}
  .add-row{display:flex;gap:12px;flex-wrap:wrap;}
  .add-row input,.add-row select{flex:1;min-width:150px;padding:10px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;outline:none;}
  .add-row input:focus,.add-row select:focus{border-color:var(--gold);}
  .add-row select option{background:var(--card);}
  .add-btn{padding:10px 24px;background:var(--gold);border:none;border-radius:4px;color:#000;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;transition:opacity .2s;white-space:nowrap;}
  .add-btn:hover{opacity:.85;}

  .table-section{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .table-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border);}
  .table-header h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;}
  .search-input{padding:8px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;outline:none;width:220px;}
  .search-input:focus{border-color:var(--red);}
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;}
  th{padding:12px 20px;text-align:left;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
  td{padding:14px 20px;font-size:14px;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.03);}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.02);}

  .badge{display:inline-block;padding:3px 10px;border-radius:2px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  .badge.active{background:rgba(0,230,118,0.15);color:var(--green);border:1px solid rgba(0,230,118,0.3);}
  .badge.expired{background:rgba(232,33,42,0.15);color:var(--red);border:1px solid rgba(232,33,42,0.3);}

  .days-bar{width:80px;height:4px;background:var(--border);border-radius:2px;margin-top:4px;}
  .days-fill{height:100%;border-radius:2px;background:var(--green);transition:width .3s;}

  .revoke-btn{padding:5px 12px;background:transparent;border:1px solid rgba(232,33,42,0.4);border-radius:3px;color:var(--red);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
  .revoke-btn:hover{background:rgba(232,33,42,0.15);}

  .empty{text-align:center;padding:60px;color:var(--muted);font-size:16px;}
  .toast{position:fixed;bottom:30px;right:30px;z-index:999;background:var(--card);border:1px solid var(--green);border-radius:6px;padding:14px 20px;font-size:14px;font-weight:600;color:var(--green);transform:translateY(100px);opacity:0;transition:all .3s;}
  .toast.show{transform:translateY(0);opacity:1;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h2>🔐 Admin Panel</h2>
    <p>Astra RP — Accès réservé</p>
    <input type="password" id="adminKey" placeholder="Clé admin..." onkeydown="if(event.key==='Enter')login()"/>
    <button class="login-btn" onclick="login()">CONNEXION</button>
  </div>
</div>

<div id="dashboard">
  <nav>
    <div class="logo">ASTRA<span>.</span>RP <span style="color:var(--text);font-size:14px;">ADMIN</span></div>
    <div class="nav-right">
      <button class="refresh-btn" onclick="loadStats()">⟳ Actualiser</button>
      <a href="/" style="color:var(--muted);font-size:13px;font-weight:700;letter-spacing:1px;text-decoration:none;">← Site</a>
    </div>
  </nav>

  <div class="page">
    <div class="stats-grid">
      <div class="stat-card green"><div class="stat-label">Serveurs actifs</div><div class="stat-value" id="statActive">—</div></div>
      <div class="stat-card red"><div class="stat-label">Expirés</div><div class="stat-value" id="statExpired">—</div></div>
      <div class="stat-card gold"><div class="stat-label">Revenus totaux</div><div class="stat-value" id="statRevenue">—</div></div>
      <div class="stat-card blue"><div class="stat-label">Total serveurs</div><div class="stat-value" id="statTotal">—</div></div>
    </div>

    <div class="add-section">
      <h3>➕ Ajouter un abonnement manuellement</h3>
      <div class="add-row">
        <input type="text" id="addGuildId" placeholder="ID du serveur Discord"/>
        <input type="text" id="addName" placeholder="Nom du propriétaire"/>
        <select id="addMonths">
          <option value="1">1 mois</option>
          <option value="2">2 mois</option>
          <option value="3">3 mois</option>
          <option value="6">6 mois</option>
          <option value="12">12 mois</option>
        </select>
        <button class="add-btn" onclick="addSub()">AJOUTER</button>
      </div>
    </div>

    <div class="table-section">
      <div class="table-header">
        <h3>📋 Serveurs abonnés</h3>
        <input class="search-input" type="text" placeholder="Rechercher..." oninput="filterTable(this.value)"/>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Propriétaire</th>
              <th>Guild ID</th>
              <th>Statut</th>
              <th>Expire le</th>
              <th>Jours restants</th>
              <th>Mois total</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div class="empty" id="emptyMsg" style="display:none">Aucun serveur abonné pour l'instant.</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let ADMIN_KEY = '';
  let allSubs = [];

  function login() {
    ADMIN_KEY = document.getElementById('adminKey').value;
    loadStats();
  }

  async function loadStats() {
    try {
      const res = await fetch('/api/admin/stats', { headers: { 'x-admin-key': ADMIN_KEY } });
      if (res.status === 403) { showToast('❌ Clé incorrecte', true); return; }
      const data = await res.json();
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('statActive').textContent  = data.activeSubscribers;
      document.getElementById('statExpired').textContent = data.expiredSubscribers;
      document.getElementById('statRevenue').textContent = (data.totalRevenue || 0).toFixed(0) + '€';
      document.getElementById('statTotal').textContent   = data.totalSubscribers;
      allSubs = data.subscriptions || [];
      renderTable(allSubs);
    } catch(e) { showToast('❌ Erreur serveur', true); }
  }

  function renderTable(subs) {
    const tbody = document.getElementById('tableBody');
    const empty = document.getElementById('emptyMsg');
    if (!subs.length) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    tbody.innerHTML = subs.map(s => {
      const exp = new Date(s.expiresAt).toLocaleDateString('fr-FR');
      const pct = Math.min(100, (s.daysLeft / 30) * 100);
      const badge = s.active ? `<span class="badge active">✅ Actif</span>` : `<span class="badge expired">❌ Expiré</span>`;
      return `<tr>
        <td><strong>${s.discordName || '—'}</strong></td>
        <td style="color:var(--muted);font-size:12px;">${s.guildId || s.discordId || '—'}</td>
        <td>${badge}</td>
        <td>${exp}</td>
        <td>
          <strong style="color:${s.daysLeft > 7 ? 'var(--green)' : 'var(--red)'}">${s.daysLeft}j</strong>
          <div class="days-bar"><div class="days-fill" style="width:${pct}%;background:${s.daysLeft > 7 ? 'var(--green)' : 'var(--red)'}"></div></div>
        </td>
        <td style="color:var(--gold)">${s.totalMonths || 1}</td>
        <td><button class="revoke-btn" onclick="revoke('${s.guildId || s.discordId}', '${s.discordName}')">Révoquer</button></td>
      </tr>`;
    }).join('');
  }

  function filterTable(q) {
    const filtered = allSubs.filter(s =>
      (s.discordName || '').toLowerCase().includes(q.toLowerCase()) ||
      (s.guildId || s.discordId || '').includes(q)
    );
    renderTable(filtered);
  }

  async function revoke(id, name) {
    if (!confirm(`Révoquer l'abonnement de ${name} ?`)) return;
    const res = await fetch('/api/admin/revoke', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
      body: JSON.stringify({ guildId: id })
    });
    const data = await res.json();
    if (data.success) { showToast(`✅ ${name} révoqué`); loadStats(); }
    else showToast('❌ Erreur', true);
  }

  async function addSub() {
    const guildId     = document.getElementById('addGuildId').value.trim();
    const discordName = document.getElementById('addName').value.trim();
    const months      = document.getElementById('addMonths').value;
    if (!guildId || !discordName) return showToast('⚠️ Remplis tous les champs', true);
    const res = await fetch('/api/admin/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
      body: JSON.stringify({ guildId, discordName, months: parseInt(months) })
    });
    const data = await res.json();
    if (data.success) {
      showToast(`✅ Serveur ${guildId} ajouté (${months} mois)`);
      loadStats();
      document.getElementById('addGuildId').value = '';
      document.getElementById('addName').value = '';
    } else showToast('❌ Erreur', true);
  }

  function showToast(msg, error = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.borderColor = error ? 'var(--red)' : 'var(--green)';
    t.style.color = error ? 'var(--red)' : 'var(--green)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  setInterval(() => { if (ADMIN_KEY) loadStats(); }, 30000);
</script>
</body>
</html>
