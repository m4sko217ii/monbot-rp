<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Annulé — Los Santos RP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root { --red:#e8212a; --dark:#0a0a0f; --card:#12121a; --border:#1e1e2e; --text:#e0e0f0; --muted:#6b6b8a; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--dark); color:var(--text); font-family:'Rajdhani',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .box { background:var(--card); border:1px solid rgba(232,33,42,0.3); border-radius:8px; padding:60px 48px; text-align:center; max-width:420px; position:relative; overflow:hidden; }
  .box::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--red); }
  .icon { font-size:64px; margin-bottom:24px; }
  h1 { font-family:'Bebas Neue',sans-serif; font-size:40px; letter-spacing:3px; color:var(--red); margin-bottom:12px; }
  p { font-size:16px; color:var(--muted); line-height:1.6; margin-bottom:32px; }
  a { display:inline-block; padding:14px 32px; background:var(--red); border-radius:4px; color:#fff; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; text-decoration:none; transition:opacity .2s; }
  a:hover { opacity:.85; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">❌</div>
  <h1>Paiement annulé</h1>
  <p>Tu as annulé le paiement. Aucun montant n'a été débité. Tu peux réessayer à tout moment.</p>
  <a href="/">← Réessayer</a>
</div>
</body>
</html>
